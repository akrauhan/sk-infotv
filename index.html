<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" type="text/css" href="style.css">
<meta http-equiv="refresh" content="600">
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div class='ongoing-block'>
<div class='event-block today'><div class='event-date'><span class='date past'>Ma 9.3</span> - <span class='date upcoming'>Ke 25.3</span></div><div class='event-name today'>Liikuntasali varattu YO-käyttöön. Kirjoituspäivinä L-siipeen vain opettajan luvalla.</div></div>
</div>
<div class='this-week-block'>
<h3 class='section-title'>Tällä viikolla</h3>
<div class='event-block today'><div class='event-date'><span class='date today'>Ma 23.3</span> - <span class='date upcoming'>Pe 27.3</span></div><div class='event-name today'>Lukuviikko</div></div>
<div class='event-block upcoming'><div class='event-date'><span class='date upcoming'>To 26.3</span></div><div class='event-name upcoming'>LO-tunti klo 12:15 - 13:00</div></div>
</div>
<div class='upcoming-block'>
<h3 class='section-title'>Tulossa</h3>
<div class='upcoming-scroll'>
<div class='upcoming-scroll-inner'>
<div class='event-block'><div class='event-date'><span class='date upcoming'>Ma 30.3</span> - <span class='date upcoming'>To 2.4</span></div><div class='event-name upcoming'>8abcd TET</div></div>
<div class='event-block'><div class='event-date'><span class='date upcoming'>Ma 30.3</span> - <span class='date upcoming'>To 2.4</span></div><div class='event-name upcoming'>8abcd TET</div></div>
</div></div>
</div>
    </div>
    <div class="right-panel">
        <div class="clock-block">
            <div class="slideshow-date"></div>
            <div class="slideshow-clock"></div>
        </div>
        <div class='slideshow'><img class='slide' src='images/10s Kässävälkkämainos.png'><img class='slide' src='images/4s logo.png'></div>   <!-- use the built slideshow -->
        <div class="timer-bar"></div>
    </div>
</div>

<script src="slideshow.js"></script>
</body>
</html>
